<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Causal Fabric - Distributed Intelligence Network</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Orbitron:wght@400;700;900&display=swap');
        
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-tertiary: #1a202e;
            --accent-primary: #00ff9f;
            --accent-secondary: #00d4ff;
            --accent-danger: #ff3366;
            --text-primary: #e0e7ff;
            --text-secondary: #94a3b8;
            --border-color: #2d3748;
            --glow-primary: rgba(0, 255, 159, 0.3);
            --glow-secondary: rgba(0, 212, 255, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            background-image: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 159, 0.03) 2px, rgba(0, 255, 159, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 212, 255, 0.03) 2px, rgba(0, 212, 255, 0.03) 4px);
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            animation: scan 3s linear infinite;
        }
        
        @keyframes scan {
            to { left: 100%; }
        }
        
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px var(--glow-primary);
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .panel-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--accent-primary);
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .node-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .node-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .node-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow-primary);
            transform: translateY(-2px);
        }
        
        .node-card.active {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--glow-primary);
        }
        
        .node-id {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-secondary);
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .vector-clock {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-primary);
            padding: 5px 8px;
            border-radius: 4px;
            margin: 5px 0;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        button {
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        button:hover:not(:disabled) {
            background: var(--accent-primary);
            color: var(--bg-primary);
            box-shadow: 0 0 20px var(--glow-primary);
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        button.danger {
            border-color: var(--accent-danger);
            color: var(--accent-danger);
        }
        
        button.danger:hover:not(:disabled) {
            background: var(--accent-danger);
            color: white;
        }
        
        input, textarea, select {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px var(--glow-primary);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .event-log {
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 10px;
        }
        
        .event-item {
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent-primary);
            border-radius: 4px;
            font-size: 0.8rem;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .event-meta {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-top: 5px;
        }
        
        .causal-graph {
            background: var(--bg-tertiary);
            border-radius: 6px;
            min-height: 400px;
            position: relative;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 6px;
        }
        
        .config-section {
            margin-bottom: 15px;
        }
        
        .config-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: var(--bg-tertiary);
            padding: 12px;
            border-radius: 6px;
            border-left: 3px solid var(--accent-secondary);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            font-family: 'Orbitron', sans-serif;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        .message-item {
            padding: 10px;
            margin-bottom: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .message-from {
            color: var(--accent-secondary);
            font-weight: 700;
        }
        
        .message-to {
            color: var(--accent-primary);
            font-weight: 700;
        }
        
        .ai-response {
            background: linear-gradient(135deg, rgba(0, 255, 159, 0.1), rgba(0, 212, 255, 0.1));
            border: 1px solid var(--accent-primary);
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
            line-height: 1.6;
        }
        
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent-primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .error-message {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid var(--accent-danger);
            color: var(--accent-danger);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CAUSAL FABRIC</h1>
            <div class="subtitle">Globally Coordinated Logical-Time Deterministic System</div>
        </header>
        
        <div class="main-grid">
            <!-- Node Management -->
            <div class="panel">
                <div class="panel-header">
                    <span>NODE NETWORK</span>
                    <div class="status-dot"></div>
                </div>
                
                <div class="button-group">
                    <button onclick="fabric.addNode()">+ ADD NODE</button>
                    <button onclick="fabric.removeNode()" class="danger">- REMOVE NODE</button>
                </div>
                
                <div class="node-grid" id="nodeGrid"></div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="nodeCount">0</div>
                        <div class="stat-label">Active Nodes</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="eventCount">0</div>
                        <div class="stat-label">Total Events</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="messageCount">0</div>
                        <div class="stat-label">Messages Sent</div>
                    </div>
                </div>
            </div>
            
            <!-- Ollama Configuration -->
            <div class="panel">
                <div class="panel-header">
                    <span>AI INTELLIGENCE LAYER</span>
                    <div class="status-dot"></div>
                </div>
                
                <div class="config-section">
                    <label class="config-label">Ollama Endpoint</label>
                    <input type="text" id="ollamaUrl" value="http://localhost:11434" placeholder="http://localhost:11434">
                </div>
                
                <div class="config-section">
                    <label class="config-label">Model</label>
                    <select id="ollamaModel">
                        <option value="llama3.2" selected>llama3.2</option>
                        <option value="mistral">mistral</option>
                        <option value="codellama">codellama</option>
                        <option value="phi">phi</option>
                        <option value="gemma">gemma</option>
                    </select>
                </div>
                
                <div class="config-section">
                    <label class="config-label">AI Prompt</label>
                    <textarea id="aiPrompt" placeholder="Enter prompt for AI to process...">Analyze the current state of the distributed system and provide insights.</textarea>
                </div>
                
                <button onclick="fabric.queryAI()" id="queryBtn">QUERY AI NETWORK</button>
                
                <div id="aiResponseContainer"></div>
            </div>
            
            <!-- Operations Panel -->
            <div class="panel">
                <div class="panel-header">
                    <span>DISTRIBUTED OPERATIONS</span>
                    <div class="status-dot"></div>
                </div>
                
                <div class="config-section">
                    <label class="config-label">Select Source Node</label>
                    <select id="sourceNode"></select>
                </div>
                
                <div class="config-section">
                    <label class="config-label">Operation Type</label>
                    <select id="operationType">
                        <option value="compute">Compute</option>
                        <option value="update">Update State</option>
                        <option value="query">Query</option>
                        <option value="broadcast">Broadcast</option>
                    </select>
                </div>
                
                <div class="config-section">
                    <label class="config-label">Operation Data</label>
                    <input type="text" id="operationData" placeholder="Operation payload...">
                </div>
                
                <div class="button-group">
                    <button onclick="fabric.executeOperation()">EXECUTE LOCAL</button>
                    <button onclick="fabric.sendMessage()">SEND MESSAGE</button>
                    <button onclick="fabric.broadcastToAll()">BROADCAST ALL</button>
                </div>
                
                <div class="config-section">
                    <label class="config-label">Message Queue</label>
                    <div class="event-log" id="messageQueue" style="max-height: 200px;"></div>
                </div>
            </div>
            
            <!-- Event Log -->
            <div class="panel">
                <div class="panel-header">
                    <span>CAUSAL EVENT LOG</span>
                    <div class="status-dot"></div>
                </div>
                
                <div class="button-group">
                    <button onclick="fabric.clearLog()">CLEAR LOG</button>
                    <button onclick="fabric.exportState()">EXPORT STATE</button>
                    <button onclick="fabric.replay()">REPLAY EVENTS</button>
                </div>
                
                <div class="event-log" id="eventLog"></div>
            </div>
            
            <!-- Causal Graph Visualization -->
            <div class="panel full-width">
                <div class="panel-header">
                    <span>CAUSAL DEPENDENCY GRAPH</span>
                    <div class="status-dot"></div>
                </div>
                
                <div class="causal-graph">
                    <canvas id="graphCanvas" width="1760" height="400"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Vector Clock Implementation
        class VectorClock {
            constructor(nodeId, nodeCount) {
                this.nodeId = nodeId;
                this.clock = new Array(nodeCount).fill(0);
            }
            
            tick() {
                this.clock[this.nodeId]++;
            }
            
            update(otherClock) {
                for (let i = 0; i < this.clock.length; i++) {
                    this.clock[i] = Math.max(this.clock[i], otherClock[i]);
                }
                this.tick();
            }
            
            happensBefore(otherClock) {
                let lessOrEqual = true;
                let strictlyLess = false;
                
                for (let i = 0; i < this.clock.length; i++) {
                    if (this.clock[i] > otherClock[i]) {
                        lessOrEqual = false;
                        break;
                    }
                    if (this.clock[i] < otherClock[i]) {
                        strictlyLess = true;
                    }
                }
                
                return lessOrEqual && strictlyLess;
            }
            
            concurrent(otherClock) {
                return !this.happensBefore(otherClock) && 
                       !this.isCausallyAfter(otherClock);
            }
            
            isCausallyAfter(otherClock) {
                let greaterOrEqual = true;
                let strictlyGreater = false;
                
                for (let i = 0; i < this.clock.length; i++) {
                    if (this.clock[i] < otherClock[i]) {
                        greaterOrEqual = false;
                        break;
                    }
                    if (this.clock[i] > otherClock[i]) {
                        strictlyGreater = true;
                    }
                }
                
                return greaterOrEqual && strictlyGreater;
            }
            
            clone() {
                const cloned = new VectorClock(this.nodeId, this.clock.length);
                cloned.clock = [...this.clock];
                return cloned;
            }
            
            toString() {
                return `[${this.clock.join(', ')}]`;
            }
            
            resize(newSize) {
                if (newSize > this.clock.length) {
                    this.clock = [...this.clock, ...new Array(newSize - this.clock.length).fill(0)];
                } else if (newSize < this.clock.length) {
                    this.clock = this.clock.slice(0, newSize);
                }
            }
        }
        
        // Node Implementation
        class Node {
            constructor(id, totalNodes) {
                this.id = id;
                this.vectorClock = new VectorClock(id, totalNodes);
                this.state = {};
                this.eventLog = [];
                this.messageQueue = [];
            }
            
            executeOperation(type, data) {
                this.vectorClock.tick();
                
                const event = {
                    id: `${this.id}-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    nodeId: this.id,
                    type: type,
                    data: data,
                    timestamp: Date.now(),
                    vectorClock: this.vectorClock.clone()
                };
                
                this.eventLog.push(event);
                
                // Deterministic state update based on operation type
                switch(type) {
                    case 'compute':
                        this.state.lastCompute = data;
                        this.state.computeCount = (this.state.computeCount || 0) + 1;
                        break;
                    case 'update':
                        Object.assign(this.state, typeof data === 'string' ? {value: data} : data);
                        break;
                    case 'query':
                        this.state.lastQuery = data;
                        break;
                    case 'broadcast':
                        this.state.lastBroadcast = data;
                        break;
                }
                
                return event;
            }
            
            receiveMessage(message) {
                this.vectorClock.update(message.vectorClock.clock);
                this.messageQueue.push(message);
                
                const event = {
                    id: `${this.id}-recv-${Date.now()}`,
                    nodeId: this.id,
                    type: 'receive',
                    data: message,
                    timestamp: Date.now(),
                    vectorClock: this.vectorClock.clone()
                };
                
                this.eventLog.push(event);
                return event;
            }
            
            resizeClock(newSize) {
                this.vectorClock.resize(newSize);
            }
        }
        
        // Main Causal Fabric System
        class CausalFabric {
            constructor() {
                this.nodes = [];
                this.globalEventLog = [];
                this.messageHistory = [];
                this.selectedNodeId = null;
                this.canvas = document.getElementById('graphCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Initialize with 3 nodes
                this.addNode();
                this.addNode();
                this.addNode();
                
                this.updateUI();
                this.startGraphAnimation();
            }
            
            addNode() {
                const nodeId = this.nodes.length;
                const node = new Node(nodeId, this.nodes.length + 1);
                
                // Resize existing node clocks
                this.nodes.forEach(n => n.resizeClock(this.nodes.length + 1));
                
                this.nodes.push(node);
                
                this.logGlobalEvent({
                    type: 'node_added',
                    nodeId: nodeId,
                    timestamp: Date.now()
                });
                
                this.updateUI();
            }
            
            removeNode() {
                if (this.nodes.length <= 1) {
                    alert('Cannot remove last node');
                    return;
                }
                
                const removed = this.nodes.pop();
                
                // Resize remaining node clocks
                this.nodes.forEach(n => n.resizeClock(this.nodes.length));
                
                this.logGlobalEvent({
                    type: 'node_removed',
                    nodeId: removed.id,
                    timestamp: Date.now()
                });
                
                if (this.selectedNodeId >= this.nodes.length) {
                    this.selectedNodeId = this.nodes.length - 1;
                }
                
                this.updateUI();
            }
            
            executeOperation() {
                const sourceId = parseInt(document.getElementById('sourceNode').value);
                const opType = document.getElementById('operationType').value;
                const opData = document.getElementById('operationData').value;
                
                const node = this.nodes[sourceId];
                const event = node.executeOperation(opType, opData);
                
                this.logGlobalEvent(event);
                this.updateUI();
            }
            
            sendMessage() {
                const sourceId = parseInt(document.getElementById('sourceNode').value);
                const opData = document.getElementById('operationData').value;
                
                // Send to random other node
                const targetId = (sourceId + 1 + Math.floor(Math.random() * (this.nodes.length - 1))) % this.nodes.length;
                
                const sourceNode = this.nodes[sourceId];
                sourceNode.vectorClock.tick();
                
                const message = {
                    from: sourceId,
                    to: targetId,
                    data: opData,
                    vectorClock: sourceNode.vectorClock.clone(),
                    timestamp: Date.now()
                };
                
                const targetNode = this.nodes[targetId];
                const event = targetNode.receiveMessage(message);
                
                this.messageHistory.push(message);
                this.logGlobalEvent(event);
                this.updateUI();
            }
            
            broadcastToAll() {
                const sourceId = parseInt(document.getElementById('sourceNode').value);
                const opData = document.getElementById('operationData').value;
                
                const sourceNode = this.nodes[sourceId];
                sourceNode.vectorClock.tick();
                
                this.nodes.forEach((node, targetId) => {
                    if (targetId !== sourceId) {
                        const message = {
                            from: sourceId,
                            to: targetId,
                            data: opData,
                            vectorClock: sourceNode.vectorClock.clone(),
                            timestamp: Date.now()
                        };
                        
                        const event = node.receiveMessage(message);
                        this.messageHistory.push(message);
                        this.logGlobalEvent(event);
                    }
                });
                
                this.updateUI();
            }
            
            async queryAI() {
                const btn = document.getElementById('queryBtn');
                const responseContainer = document.getElementById('aiResponseContainer');
                const url = document.getElementById('ollamaUrl').value;
                const model = document.getElementById('ollamaModel').value;
                const prompt = document.getElementById('aiPrompt').value;
                
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span> QUERYING...';
                
                // Prepare system state for AI
                const systemState = {
                    nodes: this.nodes.map(n => ({
                        id: n.id,
                        vectorClock: n.vectorClock.toString(),
                        state: n.state,
                        eventCount: n.eventLog.length,
                        messageCount: n.messageQueue.length
                    })),
                    totalEvents: this.globalEventLog.length,
                    totalMessages: this.messageHistory.length,
                    recentEvents: this.globalEventLog.slice(-10)
                };
                
                const fullPrompt = `You are analyzing a distributed causal fabric system with vector clocks.

Current System State:
${JSON.stringify(systemState, null, 2)}

User Query: ${prompt}

Provide a concise analysis focusing on causal relationships, system consistency, and any patterns you observe.`;
                
                try {
                    const response = await fetch(`${url}/api/generate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            model: model,
                            prompt: fullPrompt,
                            stream: false
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const data = await response.json();
                    
                    responseContainer.innerHTML = `
                        <div class="ai-response">
                            <strong>AI Analysis:</strong><br><br>
                            ${data.response.replace(/\n/g, '<br>')}
                        </div>
                    `;
                    
                    // Log AI query as event
                    this.logGlobalEvent({
                        type: 'ai_query',
                        model: model,
                        prompt: prompt.substring(0, 100),
                        timestamp: Date.now()
                    });
                    
                } catch (error) {
                    responseContainer.innerHTML = `
                        <div class="error-message">
                            <strong>Error:</strong> ${error.message}<br><br>
                            Make sure Ollama is running at ${url} and the model "${model}" is installed.<br>
                            Run: <code>ollama pull ${model}</code>
                        </div>
                    `;
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'QUERY AI NETWORK';
                }
            }
            
            logGlobalEvent(event) {
                this.globalEventLog.push(event);
                
                // Keep log manageable
                if (this.globalEventLog.length > 1000) {
                    this.globalEventLog = this.globalEventLog.slice(-500);
                }
            }
            
            clearLog() {
                this.globalEventLog = [];
                this.messageHistory = [];
                this.nodes.forEach(node => {
                    node.eventLog = [];
                    node.messageQueue = [];
                });
                this.updateUI();
            }
            
            exportState() {
                const state = {
                    nodes: this.nodes.map(n => ({
                        id: n.id,
                        vectorClock: n.vectorClock.clock,
                        state: n.state,
                        eventLog: n.eventLog
                    })),
                    globalEventLog: this.globalEventLog,
                    messageHistory: this.messageHistory,
                    timestamp: Date.now()
                };
                
                const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `causal-fabric-state-${Date.now()}.json`;
                a.click();
            }
            
            replay() {
                // Deterministic replay of all events
                const events = [...this.globalEventLog].sort((a, b) => {
                    // Sort by vector clock causality
                    if (a.vectorClock && b.vectorClock) {
                        if (a.vectorClock.happensBefore(b.vectorClock.clock)) return -1;
                        if (b.vectorClock.happensBefore(a.vectorClock.clock)) return 1;
                    }
                    return a.timestamp - b.timestamp;
                });
                
                console.log('Replaying events in causal order:', events.length);
                events.forEach((event, idx) => {
                    console.log(`Event ${idx}:`, event.type, event.vectorClock?.toString());
                });
                
                alert(`Replayed ${events.length} events in causal order. Check console for details.`);
            }
            
            updateUI() {
                // Update node grid
                const nodeGrid = document.getElementById('nodeGrid');
                nodeGrid.innerHTML = this.nodes.map(node => `
                    <div class="node-card ${this.selectedNodeId === node.id ? 'active' : ''}" 
                         onclick="fabric.selectNode(${node.id})">
                        <div class="node-id">NODE-${node.id}</div>
                        <div class="vector-clock">${node.vectorClock.toString()}</div>
                        <div style="font-size: 0.7rem; margin-top: 5px; color: var(--text-secondary);">
                            Events: ${node.eventLog.length}<br>
                            Messages: ${node.messageQueue.length}
                        </div>
                    </div>
                `).join('');
                
                // Update source node selector
                const sourceSelect = document.getElementById('sourceNode');
                sourceSelect.innerHTML = this.nodes.map(node => 
                    `<option value="${node.id}">Node ${node.id}</option>`
                ).join('');
                
                // Update stats
                document.getElementById('nodeCount').textContent = this.nodes.length;
                document.getElementById('eventCount').textContent = this.globalEventLog.length;
                document.getElementById('messageCount').textContent = this.messageHistory.length;
                
                // Update event log
                const eventLog = document.getElementById('eventLog');
                eventLog.innerHTML = this.globalEventLog.slice(-20).reverse().map(event => `
                    <div class="event-item">
                        <strong>${event.type}</strong> @ Node-${event.nodeId || 'System'}
                        ${event.vectorClock ? `<div class="event-meta">VC: ${event.vectorClock.toString()}</div>` : ''}
                        <div class="event-meta">
                            ${new Date(event.timestamp).toLocaleTimeString()}
                            ${event.data ? ` | ${typeof event.data === 'object' ? JSON.stringify(event.data).substring(0, 50) : event.data.toString().substring(0, 50)}` : ''}
                        </div>
                    </div>
                `).join('');
                
                // Update message queue
                const messageQueue = document.getElementById('messageQueue');
                messageQueue.innerHTML = this.messageHistory.slice(-10).reverse().map(msg => `
                    <div class="message-item">
                        <span class="message-from">Node-${msg.from}</span> → 
                        <span class="message-to">Node-${msg.to}</span>
                        <div class="event-meta">
                            VC: ${msg.vectorClock.toString()} | ${msg.data.substring(0, 40)}
                        </div>
                    </div>
                `).join('');
            }
            
            selectNode(nodeId) {
                this.selectedNodeId = nodeId;
                document.getElementById('sourceNode').value = nodeId;
                this.updateUI();
            }
            
            drawGraph() {
                const ctx = this.ctx;
                const width = this.canvas.width;
                const height = this.canvas.height;
                
                // Clear canvas
                ctx.fillStyle = '#1a202e';
                ctx.fillRect(0, 0, width, height);
                
                // Draw grid
                ctx.strokeStyle = 'rgba(0, 255, 159, 0.1)';
                ctx.lineWidth = 1;
                for (let x = 0; x < width; x += 50) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }
                for (let y = 0; y < height; y += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }
                
                // Position nodes in a circle
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = Math.min(width, height) / 3;
                
                const nodePositions = this.nodes.map((node, idx) => {
                    const angle = (idx / this.nodes.length) * Math.PI * 2 - Math.PI / 2;
                    return {
                        x: centerX + Math.cos(angle) * radius,
                        y: centerY + Math.sin(angle) * radius,
                        node: node
                    };
                });
                
                // Draw causal dependencies (messages)
                ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)';
                ctx.lineWidth = 2;
                this.messageHistory.slice(-50).forEach(msg => {
                    const from = nodePositions[msg.from];
                    const to = nodePositions[msg.to];
                    
                    ctx.beginPath();
                    ctx.moveTo(from.x, from.y);
                    ctx.lineTo(to.x, to.y);
                    ctx.stroke();
                    
                    // Draw arrow
                    const angle = Math.atan2(to.y - from.y, to.x - from.x);
                    const arrowLen = 15;
                    ctx.beginPath();
                    ctx.moveTo(to.x, to.y);
                    ctx.lineTo(
                        to.x - arrowLen * Math.cos(angle - Math.PI / 6),
                        to.y - arrowLen * Math.sin(angle - Math.PI / 6)
                    );
                    ctx.moveTo(to.x, to.y);
                    ctx.lineTo(
                        to.x - arrowLen * Math.cos(angle + Math.PI / 6),
                        to.y - arrowLen * Math.sin(angle + Math.PI / 6)
                    );
                    ctx.stroke();
                });
                
                // Draw nodes
                nodePositions.forEach((pos, idx) => {
                    const isSelected = idx === this.selectedNodeId;
                    const nodeRadius = 40;
                    
                    // Glow effect
                    if (isSelected) {
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#00ff9f';
                    } else {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#00d4ff';
                    }
                    
                    // Node circle
                    ctx.fillStyle = isSelected ? '#00ff9f' : '#00d4ff';
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, nodeRadius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    
                    // Node border
                    ctx.strokeStyle = '#0a0e17';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Node label
                    ctx.fillStyle = '#0a0e17';
                    ctx.font = 'bold 16px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(`N${idx}`, pos.x, pos.y);
                    
                    // Vector clock
                    ctx.fillStyle = '#e0e7ff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(pos.node.vectorClock.toString(), pos.x, pos.y + nodeRadius + 15);
                });
            }
            
            startGraphAnimation() {
                const animate = () => {
                    this.drawGraph();
                    requestAnimationFrame(animate);
                };
                animate();
            }
        }
        
        // Initialize the system
        const fabric = new CausalFabric();
    </script>
</body>
</html>
